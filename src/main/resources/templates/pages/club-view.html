<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base-layout :: layout(~{:: #club-view-content})}">
<head></head>
<body>
<div id="club-view-content">

    <style>
        .detail-card { border: none; border-radius: 1.25rem; overflow: hidden; box-shadow: 0 12px 32px rgba(15,23,42,0.1); }
        .hero-img { max-height: 360px; object-fit: cover; width: 100%; }
        .meta-badge { background: #f1f5f9; color: #475569; font-weight: 500; }
    </style>

    <div class="mb-3">
        <a th:href="@{/clubs}" class="btn btn-outline-secondary btn-sm rounded-pill">
            <i class="fa-solid fa-arrow-left me-1"></i>Quay lại danh sách
        </a>
    </div>

    <div class="card detail-card" th:if="${club != null}">
        <div th:if="${club.photoUrl != null and !#strings.isEmpty(club.photoUrl)}">
            <img th:src="${club.photoUrl}" class="hero-img" alt="Club banner"
                 onerror="this.src='https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=1200'">
        </div>
        <div th:unless="${club.photoUrl != null and !#strings.isEmpty(club.photoUrl)}"
             class="bg-slate-200 d-flex align-items-center justify-content-center py-5">
            <i class="fa-solid fa-image fa-4x text-slate-400"></i>
        </div>

        <div class="card-body p-4 p-lg-5">
            <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-3">
                <h1 class="h2 fw-bold text-slate-800 mb-0" th:text="${club.title}">Tên CLB</h1>
                <span class="badge meta-badge rounded-pill px-3 py-2">ID #<span th:text="${club.id}">1</span></span>
            </div>

            <div class="d-flex flex-wrap gap-2 mb-4">
                <span class="badge meta-badge rounded-pill px-3 py-2" th:if="${club.createdOn != null}">
                    <i class="fa-regular fa-calendar me-1"></i>
                    Tạo: <span th:text="${#temporals.format(club.createdOn, 'dd/MM/yyyy HH:mm')}">—</span>
                </span>
                <span class="badge meta-badge rounded-pill px-3 py-2" th:if="${club.updatedOn != null}">
                    <i class="fa-regular fa-clock me-1"></i>
                    Cập nhật: <span th:text="${#temporals.format(club.updatedOn, 'dd/MM/yyyy HH:mm')}">—</span>
                </span>
            </div>

            <div class="bg-slate-50 rounded-4 p-4 mb-4">
                <h5 class="fw-semibold text-slate-700 mb-3"><i class="fa-solid fa-align-left me-2 text-indigo-600"></i>Mô tả</h5>
                <p class="text-slate-600 mb-0 lh-lg" th:text="${club.content != null ? club.content : 'Chưa có mô tả.'}">Nội dung...</p>
            </div>

            <div class="d-flex flex-wrap gap-2">
                <a th:href="@{/clubs/{clubId}/events(clubId=${club.id})}" class="btn btn-info text-white rounded-pill px-4">
                    <i class="fa-solid fa-calendar-days me-1"></i>Sự kiện
                </a>
                <a th:href="@{/clubs/{clubId}/edit(clubId=${club.id})}" class="btn btn-primary rounded-pill px-4">
                    <i class="fa-solid fa-pen me-1"></i>Chỉnh sửa
                </a>
                <form th:action="@{/clubs/delete/{clubId}(clubId=${club.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-danger rounded-pill px-4"
                            onclick="return confirm('Xóa câu lạc bộ này?');">
                        <i class="fa-solid fa-trash me-1"></i>Xóa
                    </button>
                </form>
            </div>
        </div>
    </div>

</div>
</body>
</html>
