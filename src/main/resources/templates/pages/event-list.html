<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base-layout :: layout(~{:: #event-list-content})}">
<head></head>
<body>
<div id="event-list-content">

    <style>
        .event-card { transition: transform 0.2s ease, box-shadow 0.2s ease; border-radius: 1rem; }
        .event-card:hover { transform: translateY(-6px); box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12) !important; }
        .stat-card { border-radius: 1rem; border: none; }
        .empty-state { padding: 4rem 2rem; text-align: center; background: #fff; border-radius: 1rem; border: 1px dashed #cbd5e1; }
    </style>

    <div class="mb-3">
        <a th:href="@{/clubs/{clubId}(clubId=${club.id})}" class="btn btn-outline-secondary btn-sm rounded-pill">
            <i class="fa-solid fa-arrow-left me-1"></i>Quay lại CLB
        </a>
    </div>

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <div>
            <h1 class="h2 fw-bold text-slate-800 mb-1">
                <i class="fa-solid fa-calendar-days text-indigo-600 me-2"></i>Sự kiện
            </h1>
            <p class="text-muted mb-0">
                Câu lạc bộ: <span class="fw-semibold text-slate-700" th:text="${club.title}">Tên CLB</span>
            </p>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/clubs/{clubId}/events/new(clubId=${club.id})}" class="btn btn-primary rounded-pill px-4">
                <i class="fa-solid fa-plus me-1"></i>Thêm sự kiện
            </a>
        </div>
    </div>

    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show rounded-3" role="alert">
        <i class="fa-solid fa-circle-check me-2"></i>Thao tác thành công!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${param.deleted}" class="alert alert-danger alert-dismissible fade show rounded-3" role="alert">
        <i class="fa-solid fa-circle-check me-2"></i>Đã xóa sự kiện thành công!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-lg-3">
            <div class="card stat-card bg-indigo-600 text-white shadow-sm">
                <div class="card-body py-3">
                    <div class="small opacity-75">Tổng sự kiện</div>
                    <div class="fs-3 fw-bold" th:text="${events != null ? #lists.size(events) : 0}">0</div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${events != null and !#lists.isEmpty(events)}" class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
        <div class="col" th:each="event : ${events}">
            <div class="card h-100 shadow-sm event-card border-0">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title fw-bold mb-0" th:text="${event.name}">Tên sự kiện</h5>
                        <span class="badge text-bg-light">#<span th:text="${event.id}">1</span></span>
                    </div>
                    <p class="text-muted small mb-1" th:if="${event.startTime != null}">
                        <i class="fa-regular fa-clock me-1"></i>Bắt đầu:
                        <span th:text="${#temporals.format(event.startTime, 'dd/MM/yyyy HH:mm')}">—</span>
                    </p>
                    <p class="text-muted small mb-1" th:if="${event.endTime != null}">
                        <i class="fa-regular fa-hourglass-half me-1"></i>Kết thúc:
                        <span th:text="${#temporals.format(event.endTime, 'dd/MM/yyyy HH:mm')}">—</span>
                    </p>
                    <p class="text-muted small mb-0" th:if="${event.createdOn != null}">
                        <i class="fa-regular fa-calendar me-1"></i>Tạo:
                        <span th:text="${#temporals.format(event.createdOn, 'dd/MM/yyyy HH:mm')}">—</span>
                    </p>

                    <div class="d-flex gap-2 mt-auto pt-3">
                        <a th:href="@{/clubs/{clubId}/events/{eventId}(clubId=${club.id}, eventId=${event.id})}" class="btn btn-outline-info rounded-pill">
                            <i class="fa-solid fa-eye me-1"></i>Xem chi tiết
                        </a>
                        <form th:action="@{/clubs/{clubId}/events/{eventId}/delete(clubId=${club.id}, eventId=${event.id})}" th:method="post" class="d-inline">
                            <button type="submit" class="btn btn-danger rounded-pill" onclick="return confirm('Bạn có chắc chắn muốn xóa sự kiện này?')">
                                <i class="fa-solid fa-trash me-1"></i>Xóa
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${events == null or #lists.isEmpty(events)}" class="empty-state">
        <i class="fa-regular fa-calendar-xmark fa-4x text-slate-300 mb-3"></i>
        <h4 class="text-slate-600 fw-bold">Chưa có sự kiện nào</h4>
        <p class="text-muted">Tạo sự kiện đầu tiên cho câu lạc bộ này.</p>
        <a th:href="@{/clubs/{clubId}/events/new(clubId=${club.id})}" class="btn btn-primary rounded-pill px-4 mt-2">
            <i class="fa-solid fa-plus me-1"></i>Thêm sự kiện
        </a>
    </div>

</div>
</body>
</html>
