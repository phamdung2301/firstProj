<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base-layout :: layout(~{:: #club-edit-content})}">
<head></head>
<body>
<div id="club-edit-content">

    <style>
        .form-card { border: none; border-radius: 1.25rem; overflow: hidden; box-shadow: 0 10px 30px rgba(15,23,42,0.08); }
        .form-header { background: linear-gradient(135deg, #0d9488, #0891b2); color: #fff; padding: 1.75rem; }
        .preview-box { border: 2px dashed #e2e8f0; border-radius: 0.75rem; padding: 1rem; background: #f8fafc; }
        .preview-img { max-height: 180px; border-radius: 0.5rem; }
    </style>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card form-card">
                <div class="form-header">
                    <h2 class="h4 fw-bold mb-1"><i class="fa-solid fa-pen-to-square me-2"></i>Chỉnh sửa Câu lạc bộ</h2>
                    <p class="mb-0 opacity-75 small">Cập nhật thông tin và lưu thay đổi</p>
                </div>
                <div class="card-body p-4 p-lg-5">
                    <form method="post" th:action="@{/clubs/{clubId}/edit(clubId=${club.id})}" th:object="${club}">
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label for="title" class="form-label fw-semibold">Tiêu đề <span class="text-danger">*</span></label>
                            <input type="text" class="form-control rounded-3" id="title" th:field="*{title}">
                            <p th:if="${#fields.hasErrors('title')}" class="text-danger small mt-1" th:errors="*{title}"></p>
                        </div>
                        <div class="mb-3">
                            <label for="photoUrl" class="form-label fw-semibold">URL hình ảnh</label>
                            <input type="url" class="form-control rounded-3" id="photoUrl" th:field="*{photoUrl}">
                            <p th:if="${#fields.hasErrors('photoUrl')}" class="text-danger small mt-1" th:errors="*{photoUrl}"></p>
                        </div>
                        <div class="mb-3" id="previewWrapper"
                             th:style="${club.photoUrl != null and !#strings.isEmpty(club.photoUrl)} ? 'display:block' : 'display:none'">
                            <label class="form-label text-muted small">Ảnh hiện tại</label>
                            <div class="preview-box text-center">
                                <img id="imagePreview" th:src="*{photoUrl}" class="preview-img" alt="Preview"
                                     onerror="this.src='https://via.placeholder.com/400x180?text=No+Image'">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="content" class="form-label fw-semibold">Mô tả</label>
                            <textarea class="form-control rounded-3" id="content" rows="5" th:field="*{content}"></textarea>
                            <p th:if="${#fields.hasErrors('content')}" class="text-danger small mt-1" th:errors="*{content}"></p>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/clubs}" class="btn btn-outline-secondary rounded-pill px-4">
                                <i class="fa-solid fa-arrow-left me-1"></i>Quay lại
                            </a>
                            <button type="submit" class="btn btn-success rounded-pill px-4">
                                <i class="fa-solid fa-floppy-disk me-1"></i>Lưu
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('photoUrl').addEventListener('input', function (e) {
            const url = e.target.value.trim();
            const wrap = document.getElementById('previewWrapper');
            const img = document.getElementById('imagePreview');
            if (url) { img.src = url; wrap.style.display = 'block'; }
            else { wrap.style.display = 'none'; }
        });
    </script>

</div>
</body>
</html>
