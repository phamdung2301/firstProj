name: Generate AI Readme
on:
  workflow_dispatch: # Chỉ chạy khi bấm nút

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install AI lib
        run: pip install google-genai
      - name: Run AI Script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python -c "
          import os
          from google import genai
          client = genai.Client(api_key=os.environ['GOOGLE_API_KEY'])
          # Chỉ liệt kê các file chính, bỏ qua thư mục rác .git, .idea, .mvn
          content = 'Cấu trúc dự án: ' + os.popen('find . -maxdepth 3 -not -path \"*/.*\"').read()
          response = client.models.generate_content(
              model='gemini-2.5-flash-lite',
              contents='Hãy viết file README.md chuyên nghiệp, định dạng Markdown cho dự án Java này. Chỉ cần tổng quan, công nghệ và cấu trúc chính: ' + content
          )
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(response.text)
          "
      - name: Push new README
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m 'Docs: Auto-generate README' || exit 0
          git push