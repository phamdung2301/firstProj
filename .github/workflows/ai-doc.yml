name: Generate AI Readme
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install AI lib
        run: pip install google-genai
      - name: Run AI Script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python -c "
          import os
          from google import genai
          
          client = genai.Client(api_key=os.environ['GOOGLE_API_KEY'])
          
          # Đọc cấu trúc dự án
          content = 'Cấu trúc dự án này: ' + os.popen('find . -maxdepth 2 -not -path \"*/.*\"').read()
          
          # Dùng model 'gemini-2.0-flash' - model mới nhất hiện nay
          try:
              response = client.models.generate_content(
                  model='gemini-2.0-flash',
                  contents='Hãy viết file README.md chuyên nghiệp cho dự án có cấu trúc sau: ' + content
              )
          except Exception as e:
              # Nếu vẫn lỗi, in ra danh sách model để debug
              print('Lỗi model, thử lại với danh sách model khả dụng:')
              for m in client.models.list():
                  print(m.name)
              raise e
          
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(response.text)
          "
      - name: Push new README
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m 'Docs: Auto-generate README' || exit 0
          git push