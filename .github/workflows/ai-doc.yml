name: Generate AI Readme
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Nâng cấp lên 3.11 theo cảnh báo của Google
      - name: Install AI lib
        run: pip install -U google-generativeai
      - name: Run AI Script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python -c "
          import os, google.generativeai as genai
          genai.configure(api_key=os.environ['GOOGLE_API_KEY'])
          # Đổi sang model 'gemini-1.5-flash-latest' để đảm bảo luôn trỏ vào bản ổn định nhất
          model = genai.GenerativeModel('gemini-1.5-flash-latest')
          
          # Lấy danh sách file để AI hiểu cấu trúc
          content = 'Cấu trúc dự án này: ' + os.popen('find . -maxdepth 2 -not -path \"*/.*\"').read()
          
          prompt = 'Hãy viết file README.md chuyên nghiệp, định dạng Markdown dựa trên cấu trúc dự án này: ' + content
          response = model.generate_content(prompt)
          
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(response.text)
          "
      - name: Push new README
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m 'Docs: Auto-generate README' || exit 0
          git push