name: Generate AI Readme
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install AI lib
        run: pip install google-genai

      - name: Run AI Script
        env:
          # PHẢI KHỚP VỚI TÊN TRONG GITHUB SECRETS CỦA CẬU
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import os, sys
          from google import genai
          try:
              # Khởi tạo với biến môi trường mới
              client = genai.Client(api_key=os.environ['GEMINI_API_KEY'])
              content = 'Project Structure: ' + os.popen('find . -maxdepth 2 -not -path \"*/.*\"').read()
          
              response = client.models.generate_content(
                  model='gemini-2.0-flash', 
                  contents='Write a professional README.md for this project structure: ' + content
              )
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(response.text)
          except Exception as e:
              print(f'Lỗi chi tiết: {e}')
              sys.exit(1)
          "

      - name: Push new README
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m 'Docs: Auto-generate README' || exit 0
          git push