name: Generate AI Readme
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Đã nâng cấp lên v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Đã nâng cấp lên v5
        with:
          python-version: '3.12' # Dùng bản Python mới nhất

      - name: Install AI lib
        run: pip install google-genai

      - name: Run AI Script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python -c "
          import os, sys
          from google import genai
          try:
              client = genai.Client(api_key=os.environ['GOOGLE_API_KEY'])
              content = 'Cấu trúc dự án: ' + os.popen('find . -maxdepth 2 -not -path \"*/.*\"').read()
              response = client.models.generate_content(
                  model='gemini-2.5-flash-lite',
                  contents='Viết README chuyên nghiệp cho: ' + content
              )
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(response.text)
          except Exception as e:
              print(f'Lỗi không mong muốn: {e}')
              sys.exit(1)
          "

      - name: Push new README
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m 'Docs: Auto-generate README' || exit 0
          git push